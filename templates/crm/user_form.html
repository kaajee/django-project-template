{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{% if object %}Edit user{% else %}New user{% endif %} · CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h1 class="h3 mb-4">{% if object %}Edit user{% else %}New user{% endif %}</h1>
    {% crispy form %}
    <a class="btn btn-link mt-2" href="{% url 'crm:user-list' %}">Back to list</a>
  </div>
</div>
{% endblock %}
